    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: #0a0a0a;
        background: white;
      }
      .wrap { position: relative; min-height: 100vh; overflow: hidden; }
      .bg-sky-tint {
        position: fixed; inset: 0; z-index: -1; pointer-events: none;
        background:
          radial-gradient(40rem 40rem at 85% -10%, rgba(125, 211, 252, 0.35), transparent 60%),
          radial-gradient(34rem 34rem at 10% 110%, rgba(186, 230, 253, 0.35), transparent 60%),
          linear-gradient(to bottom, rgba(240, 249, 255, 0.7), rgba(255,255,255,0) 30%);
        filter: saturate(1.05);
      }
      .container {
        max-width: 64rem; margin: 0 auto; padding: 0 1.5rem;
        min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
      }
      .wordmark { display: inline-flex; align-items: baseline; gap: .25rem;
        font-weight: 600; letter-spacing: -0.01em; margin-bottom: 1rem; }
      .wordmark .a { font-size: clamp(2.5rem, 6vw, 3.5rem); line-height: .9; }
      .wordmark .ai { font-size: clamp(2.5rem, 6vw, 3.5rem); line-height: .9; color: #0ea5e9; }
      h1 { font-size: clamp(1.375rem, 2.5vw, 1.875rem); font-weight: 500; letter-spacing: -0.01em; margin: 0; }
      .chip { margin-top: 1.25rem; display: inline-flex; align-items: center; padding: .5rem 1rem;
        border-radius: 9999px; border: 1px solid #e5e7eb; background: rgba(255,255,255,0.8);
        box-shadow: 0 1px 2px rgba(0,0,0,.06); backdrop-filter: blur(6px); color: #3f3f46; font-size: .875rem; }
      footer { position: absolute; bottom: 1.25rem; left: 0; right: 0; text-align: center; color: #71717a; font-size: .75rem; }
    </style>

  <body>
    <div class="wrap">
      <div class="bg-sky-tint" aria-hidden="true"></div>
      <section class="container">
        <div class="wordmark"><span class="a">āyatt</span><span class="ai">.ai</span></div>
